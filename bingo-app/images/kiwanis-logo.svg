<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- Outer gold ring -->
  <circle cx="100" cy="100" r="95" fill="#003087" stroke="#FDB813" stroke-width="7"/>
  <!-- Inner decorative ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#FDB813" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- Gold K lettermark -->
  <text x="100" y="78" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="70" font-weight="900" fill="#FDB813">K</text>
  <!-- KIWANIS text -->
  <text x="100" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="bold" fill="white" letter-spacing="3">KIWANIS</text>
  <!-- Divider line -->
  <line x1="40" y1="142" x2="160" y2="142" stroke="#FDB813" stroke-width="1.5"/>
  <!-- INTERNATIONAL text -->
  <text x="100" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FDB813" letter-spacing="1.5">INTERNATIONAL</text>
</svg>
