<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" width="280" height="200">
  <!-- Black background with rounded corners -->
  <rect width="280" height="200" rx="16" fill="#111111"/>
  <!-- Orange border -->
  <rect x="5" y="5" width="270" height="190" rx="12" fill="none" stroke="#FF6600" stroke-width="5"/>
  <!-- Inner orange accent lines -->
  <line x1="20" y1="52" x2="260" y2="52" stroke="#FF6600" stroke-width="2"/>
  <line x1="20" y1="148" x2="260" y2="148" stroke="#FF6600" stroke-width="2"/>
  <!-- TECUMSEH main text in orange -->
  <text x="140" y="118" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="48" font-weight="900" fill="#FF6600" letter-spacing="2">TECUMSEH</text>
  <!-- Decorative arrow elements -->
  <polygon points="20,30 35,22 35,38" fill="#FF6600"/>
  <polygon points="260,30 245,22 245,38" fill="#FF6600"/>
  <polygon points="20,170 35,162 35,178" fill="#FF6600"/>
  <polygon points="260,170 245,162 245,178" fill="#FF6600"/>
</svg>
